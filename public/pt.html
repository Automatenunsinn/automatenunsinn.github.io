<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerTool Code Rechner - Automatenunsinn</title>
    <meta name="description" content="Kostenloser Online-Rechner für Merkur PowerTool Codes aus dem Abrufcode oder der Volumeseriennummer.">
    <meta name="keywords" content="Merkur, PowerTool, Code, Rechner, Generator, Abrufcode, Volumeseriennummer">
    <meta property="og:title" content="PowerTool Code Rechner - Automatenunsinn">
    <meta property="og:description" content="Kostenloser Online-Rechner für Merkur PowerTool Codes.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://automatenunsinn.github.io/pt.html">
    <link rel="canonical" href="https://automatenunsinn.github.io/pt.html" />
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "PowerTool Code Rechner",
        "url": "https://automatenunsinn.github.io/pt.html",
        "description": "Kostenloser Online-Rechner zur Generierung von Merkur PowerTool Codes.",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "Web Browser",
        "author": {
          "@type": "Organization",
          "name": "Automatenunsinn"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": ["MathSolver", "LearningResource"],
        "name": "PowerTool Code Rechner",
        "url": "https://automatenunsinn.github.io/pt.html",
        "usageInfo": "https://automatenunsinn.github.io/pt.html",
        "inLanguage": "de",
        "potentialAction": [{
          "@type": "SolveMathAction",
          "target": "https://automatenunsinn.github.io/pt.html?q={math_expression_string}",
          "mathExpression-input": "required name=math_expression_string",
          "eduQuestionType": ["Arithmetic"]
         }],
        "learningResourceType": "Math solver"
      }
    ]
    </script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
</head>
<body data-bs-theme="dark" class="bg-dark text-light">
    <main class="container py-5">
        <div class="card bg-dark border-secondary shadow-lg">
            <div class="card-body">
        <h1 class="mb-4 text-center">PowerTool Code Calculator</h1>
        <input type="text" id="volumeSerial" placeholder="Volumeseriennummer von C:\ (einsehbar mit Befehl vol C: )" maxlength=9 class="form-control"><br>
        <input type="button" onclick="calcRequestCode()" value="Ausrechnen" class="btn btn-outline-light"><br>
        <i>oder direkt</i><br>
        <input type="text" id="requestCode" placeholder="Abrufcode" maxlength=10 class="form-control"><br>
        <input type="button" onclick="calculateCode()" value="Ausrechnen" class="btn btn-outline-light"><br>
        <div class="card bg-body-secondary border-secondary p-3 mb-3">
            <label for="out">Code:</label>
            <input type="text" name="out" id="out" value="" readonly class="form-control"><br>
        </div>
        <input type="button" id="downloadButton" onclick="downloadCode()" value=".reg runterladen" disabled class="btn btn-outline-light">
        <a href="index.html" class="btn btn-link text-decoration-none text-light">Zurück</a>
    </div></div></main>
    <script src="pt.js"></script>
</body>
</html>
