<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerTool Code Rechner - Automatenunsinn</title>
    <meta name="description" content="Kostenloser Online-Rechner für Merkur PowerTool Codes aus dem Abrufcode oder der Volumeseriennummer.">
    <meta name="keywords" content="Merkur, PowerTool, Code, Rechner, Generator, Abrufcode, Volumeseriennummer">
    <meta property="og:title" content="PowerTool Code Rechner - Automatenunsinn">
    <meta property="og:description" content="Kostenloser Online-Rechner für Merkur PowerTool Codes.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://automatenunsinn.github.io/pt.html">
    <link rel="canonical" href="https://automatenunsinn.github.io/pt.html" />
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "PowerTool Code Rechner",
      "url": "https://automatenunsinn.github.io/pt.html",
      "description": "Kostenloser Online-Rechner zur Generierung von Merkur PowerTool Codes.",
      "applicationCategory": "UtilityApplication",
      "operatingSystem": "Web Browser",
      "author": {
        "@type": "Organization",
        "name": "Automatenunsinn"
      }
    }
    </script>
</head>
<body>
    <div class="container">
        <h1>PowerTool Code Calculator</h1>
        <input type="text" id="volumeSerial" placeholder="Volumeseriennummer von C:\ (einsehbar mit Befehl vol C: )" maxlength=9><br>
        <input type="button" onclick="calcRequestCode()" value="Ausrechnen"><br>
        <i>oder direkt</i><br>
        <input type="text" id="requestCode" placeholder="Abrufcode" maxlength=10><br>
        <input type="button" onclick="calculateCode()" value="Ausrechnen"><br>
        <div class="output">
            <label for="out">Code:</label>
            <input type="text" name="out" id="out" value="" readonly><br>
        </div>
        <input type="button" id="downloadButton" onclick="downloadCode()" value=".reg runterladen" disabled>
        <a href="index.html">Zurück</a>
    </div>
    <script src="pt.js"></script>
</body>
</html>
