    <style>
        #slot-machine {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wheel-container {
            position: relative;
            width: 150px;
            /* Slightly larger than the wheel for border visibility */
            height: 450px;
            overflow: hidden;
            border: 2px solid #000;
            border-radius: 2px;
            background-color: #fff;
        }

        .wheel {
            position: absolute;
            width: 150px;
            height: 600px;
            transition: transform 3s cubic-bezier(.8,.1,.9,1.2);
        }

        .symbol {
            font-size: 6rem;
            text-align: center;
            display: block;
            width: 150px;
            height: 150px;
            line-height: 150px;
        }

        button {
            display: block;
            margin: auto;
        }
    </style>
