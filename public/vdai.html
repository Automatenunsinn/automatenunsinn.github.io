<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automaten auslesen - Automatenunsinn</title>
    <meta name="description" content="Tool zum Auslesen von Spielautomaten nach dem VDAI Standard.">
    <meta name="keywords" content="VDAI, auslesen, Spielautomat, Automatenunsinn">
    <link rel="canonical" href="https://automatenunsinn.github.io/vdai.html">
    <meta property="og:title" content="Automaten auslesen - Automatenunsinn">
    <meta property="og:description" content="Tool zum Auslesen von Spielautomaten nach dem VDAI Standard.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://automatenunsinn.github.io/vdai.html">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Automaten auslesen - Automatenunsinn",
      "url": "https://automatenunsinn.github.io/vdai.html",
      "description": "Tool zum Auslesen von Spielautomaten nach dem VDAI Standard.",
      "applicationCategory": "Tool",
      "operatingSystem": "Web"
    }
    </script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="vdai.js" type="module"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</head>

<body data-bs-theme="dark" class="bg-dark text-light">
    <main class="container py-5">
        <div class="card bg-dark border-secondary shadow-lg">
            <div class="card-body">
        <h1 class="mb-4 text-center">Automaten auslesen</h1>
        <p>Hiermit kann die Statistik des Automaten ausgelesen werden.</p>
        <p>Zum auslesen wird der Druckeranschluss verwendet.</p>
        <p> Benötigt wird ein <a href="https://amzn.to/48dSc6G">USB-Seriell Kabel</a>, für ältere Geräte eventuell ein
            Adapter auf DIN 5-Pol.</p>
        <div class="d-flex flex-wrap gap-2 mb-3">
            <label><input type="radio" name="size" value="adpalt">ADP (weisse CPU)</label>
            <label><input type="radio" name="size" value="adp">ADP (91er)</label>
            <label><input type="radio" name="size" value="bally">Bally (vor Eurotec)</label>
            <label><input type="radio" name="size" value="berg">Bergmann (bis 199x)</label>
            <label><input type="radio" name="size" value="vdai" checked>VDAI</label>
        </div>
        <button id="connectBtn" class="btn btn-outline-light">Verbindung herstellen</button><br>

        <fieldset id="adpaltOptions" style="display: none;">
            <label for="adpaltTime">Uhr:</label>
            <input type="datetime-local" id="adpaltTime">
            <button id="adpaltTimeBtn" class="btn btn-outline-light">Zeit senden</button>
            <div style="margin-top: 10px;">
                <button id="ramsetBtn" class="btn btn-outline-light">RAMSET</button>
                <button id="seriniBtn" class="btn btn-outline-light">SERINI</button>
                <button id="giradaBtn" class="btn btn-outline-light">GIRADA</button>
                <button id="rsokBtn" class="btn btn-outline-light">RSOK</button>
                <button id="milBtn" class="btn btn-outline-light">MILLIONENSPIEL</button>
            </div>
        </fieldset>

        <fieldset id="vdaiOptions">
            <div class="row row-cols-1 row-cols-md-2 g-3">
                <div class="col p-3 bg-secondary bg-opacity-10 rounded-3">
                    <label><input type="radio" name="eg" value="">Keine Einsätze</label>
                    <label><input type="radio" name="eg" value="e">Einsätze (kurz)</label>
                    <label><input type="radio" name="eg" value="E" checked>Einsätze (lang)</label>
                    <label><input type="radio" name="eg" value="g">Gewinne (kurz)</label>
                    <label><input type="radio" name="eg" value="G">Gewinne (lang)</label>
                </div>
                <div class="col p-3 bg-secondary bg-opacity-10 rounded-3">
                    <label><input type="checkbox" id="vdaiDelete" checked>Daten nach Ausdruck löschen</label>
                    <label><input type="checkbox" id="vdaiStat" checked>Statistik</label>
                    <label><input type="checkbox" id="vdaiLast20">Letzte 20 Kassierungen</label>
                    <label><input type="checkbox" id="vdaiCopy">Kopie des letzten Ausdrucks</label>
                    <label><input type="checkbox" id="vdaiCheck">Checksumme</label>
                </div>
            </div>

            <div class="vdai-code-display">
                <label for="sendCommandField">Befehl:</label>
                <input type="text" id="sendCommandField" class="form-control">
            </div>
        </fieldset>

        <button id="sendBtn" disabled class="btn btn-outline-light">Auslesen starten</button><br>

        <label for="logArea">Log</label>
        <textarea id="logArea" readonly style="height: 40em;" class="form-control"></textarea>

        <a href="index.html" class="btn btn-secondary">Zurück</a>
    </div></div></main>
</body>

</html>
