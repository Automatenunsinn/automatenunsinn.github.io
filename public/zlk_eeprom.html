<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>ZLK EEPROM Builder</title>
  <meta name="description" content="Generator für Zulassungskarten EEPROMs">
  <meta property="og:title" content="ZLK EEPROM Builder">
  <meta property="og:description" content="Generator für Zulassungskarten EEPROMs">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://automatenunsinn.github.io/zlk_eeprom.html">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
  <h1>ZLK EEPROM Builder</h1>
  <p>Die Zulassungskarte muss zur Zulassungsnummer der Maschine passen.</p>
  <p>Manchmal stimmen die Nummern außen auf dem Gerät nicht.</p>
  <p>Am besten die Nummer vom Ausdruck oder aus dem Menü auslesen.</p>
  <input type="text" id="serialInput" placeholder="Zulassungsnummer (9 Ziffern)"><br>
  <select id="machineSelect"></select>
  <input type="text" id="machinebyte" readonly placeholder="Nummer">
  <input type="text" id="machinetype" readonly placeholder="Typ"><br>
  <input type="button" id="patchButton" value="Generieren" onclick="patchCode()"><br>
  <a id="downloadButton"></a><br>
  <a href="https://automatenunsinn.github.io/index.html">Zurück</a>
  </div>
  <script src="zlk_eeprom.js"></script>
</body>
</html>
