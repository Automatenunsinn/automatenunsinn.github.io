<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serial Loader - Automatenunsinn</title>
    <meta name="description" content="Tool zum Beschreiben von ADP Datenbanken über WebSerial. Unterstützt verschiedene Modulgrößen und Datumseinstellungen für die Reparatur von Spielautomaten.">
    <meta name="keywords" content="ADP, Merkur, Bally Wulff, Spielautomat, Reparatur, Automatenunsinn, Serial Loader, Datenbank, WebSerial">
    <link rel="canonical" href="https://automatenunsinn.github.io/dbwrite.html">
    <meta property="og:title" content="Serial Loader - Automatenunsinn">
    <meta property="og:description" content="Tool zum Beschreiben von ADP Datenbanken über WebSerial. Unterstützt verschiedene Modulgrößen und Datumseinstellungen für die Reparatur von Spielautomaten.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://automatenunsinn.github.io/dbwrite.html">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Serial Loader - Automatenunsinn",
      "url": "https://automatenunsinn.github.io/dbwrite.html",
      "description": "Tool zum Beschreiben von ADP Datenbanken über WebSerial. Unterstützt verschiedene Modulgrößen und Datumseinstellungen für die Reparatur von Spielautomaten.",
      "applicationCategory": "Tool",
      "operatingSystem": "Web",
      "author": {
        "@type": "Organization",
        "name": "Automatenunsinn"
      }
    }
    </script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="db.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="dbwrite.js" type="module"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
</head>

<body data-bs-theme="dark" class="bg-dark text-light">
    <div class="container">
        <h1>Serial Loader</h1>

        <div class="side-by-side">
            <div>
                <button id="connectBtn" class="btn btn-outline-light">Verbinden</button>

                <h3>Größe</h3>
                <div class="size-selector" id="sizeSelector"></div>

                <h3>Automaten auswählen</h3>

                <div id="db" class="db-31415900">
                    <span id="sealo">❂</span>
                    <input type="text" id="fileSelect" list="fileList" class="dbname">
                    <datalist id="fileList"></datalist>
                    <span id="datenbank-text">DATENBANK</span>
                    <span id="sealu">❂</span>
                </div>

                <div id="fileInfo" class="kleingedrucktes"></div>
                <button id="loadFileBtn" class="btn btn-outline-light">Aus Liste laden</button>
                <button id="loadCustomXcBtn" class="btn btn-outline-light">Eigene XC-Datei...</button>

                <legend>Aktionen</legend>
                <button id="fullFlashBtn" disabled class="btn btn-outline-light">Komplett flashen</button>

            </div>

            <div>
                <details class="advanced-settings">
                    <summary>Erweiterte Einstellungen</summary>
                    <fieldset>
                        <legend>Loader</legend>
                        <div id="loaderInfo" class="kleingedrucktes">Automatisch basierend auf Größe</div>
                        <button id="resetLoaderBtn" class="btn btn-outline-light">Loader zurücksetzen</button>
                        <button id="loadCustomLoaderBtn" class="btn btn-outline-light">Eigenen Loader...</button>
                    </fieldset>

                    <fieldset>
                        <legend>Datumseinstellungen</legend>
                        <label for="yearSelect">Jahr:</label>
                        <input type="number" id="yearSelect" min="1992" max="2037" value="2005" class="form-control"></input>
                    </fieldset>

                    <fieldset>
                        <legend>Factory Reset</legend>
                        <div id="factoryInfo" class="kleingedrucktes">Automatisch basierend auf Größe</div>
                        <button id="resetFactoryBtn" class="btn btn-outline-light">Factory zurücksetzen</button>
                        <button id="loadCustomFactoryBtn" class="btn btn-outline-light">Eigenes Factory...</button>
                    </fieldset>
                </details>

                <details class="advanced-settings">
                    <summary>Erweiterte Aktionen</summary>
                    <fieldset>
                        <button id="killBtn" disabled class="btn btn-outline-light">⚠️ Datenbank löschen</button>
                        <button id="uploadLoaderBtn" disabled class="btn btn-outline-light">Loader hochladen</button>
                        <button id="setTimeBtn" disabled class="btn btn-outline-light">Zeit setzen</button>
                        <button id="uploadFactoryBtn" disabled class="btn btn-outline-light">Factory hochladen</button>
                        <button id="uploadXcBtn" disabled class="btn btn-outline-light">XC hochladen</button>
                    </fieldset>
                </details>

                <div class="progress-row">
                    <progress id="progressBar" max="100"></progress>
                </div>

                <label for="logArea">Log</label>
                <textarea id="logArea" readonly style="height: 40em;" class="form-control"></textarea>
            </div>
        </div>
        <a href="index.html">Zurück</a>
    </div>
</body>

</html>
