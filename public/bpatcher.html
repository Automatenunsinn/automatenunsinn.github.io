<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bally Wulff EPROM Patcher - Automatenunsinn</title>
    <meta name="description" content="Tool zum Patchen von EPROMs für Bally Wulff Automaten. Behebt den NVRAM Init Fehler und setzt das Datum, um die Uhrprobleme zu beheben.">
    <meta name="keywords" content="Bally Wulff, EPROM, Patcher, NVRAM Init, Reparatur, Automatenunsinn">
    <link rel="canonical" href="https://automatenunsinn.github.io/bpatcher.html">
    <meta property="og:title" content="Bally Wulff EPROM Patcher - Automatenunsinn">
    <meta property="og:description" content="Tool zum Patchen von EPROMs für Bally Wulff Automaten. Behebt den NVRAM Init Fehler und setzt das Datum, um die Uhrprobleme zu beheben.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://automatenunsinn.github.io/bpatcher.html">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Bally Wulff EPROM Patcher - Automatenunsinn",
      "url": "https://automatenunsinn.github.io/bpatcher.html",
      "description": "Tool zum Patchen von EPROMs für Bally Wulff Automaten. Behebt den NVRAM Init Fehler und setzt das Datum, um die Uhrprobleme zu beheben.",
      "applicationCategory": "Tool",
      "operatingSystem": "Web"
    }
    </script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
</head>

<body data-bs-theme="dark" class="bg-dark text-light">
    <div class="container">
        <h1>Bally Wulff EPROM Patcher Tool</h1>

        <section>
            <h2>ROM laden</h2>
            <div class="file-groups-container">
                <div class="file-group">
                    <label>16-Bit-Datei laden:</label>
                    <input type="file" id="singleRom" accept=".bin" disabled class="form-control">
                    <button onclick="loadSingleFile()" class="tooltip" data-tooltip="Kommt noch" disabled>Laden</button>
                </div>
                <div class="file-group">
                    <label>Duale 8-Bit-Dateien laden:</label>
                    <div class="file-pair">
                        <input type="file" id="oddRom" accept=".bin,.ic15" class="form-control">
                        <span>ODD (IC15)</span>
                    </div>
                    <div class="file-pair">
                        <input type="file" id="evenRom" accept=".bin,.ic10" class="form-control">
                        <span>EVEN (IC10)</span>
                    </div>
                    <button onclick="loadDualFiles()" class="btn btn-outline-light">Laden</button>
                </div>
            </div>
        </section>

        <section>
            <h2>Patch-Einstellungen</h2>
            <div class="form-group">
                <label for="dateInput">Datum (JJJJMMTT):</label>
                <input type="text" id="dateInput" value="20111213" class="form-control">
            </div>
            <div class="form-group">
                <label for="zlInput">Zulassungsnummer:</label>
                <input type="text" id="zlInput" placeholder="123456789" class="form-control">
            </div>
        </section>

        <section>
            <h2>Patch-Prozess</h2>
            <button onclick="patchEPROM()" class="btn btn-outline-light">ROM patchen</button><br>
            <progress id="progressBar" value="0" max="100"></progress>
        </section>

        <section>
            <h2>Informationen</h2>
            <div id="statusText">Bereit</div>
            <div id="romInfo"></div>
        </section>

        <a href="index.html">Zurück</a>
    </div>
    <script src="bpatcher.js" type="module"></script>
</body>

</html>
