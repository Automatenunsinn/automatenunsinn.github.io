<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bally Wulff Code Rechner - Automatenunsinn</title>
    <meta name="description" content="Kostenloser Online-Rechner zur Generierung von Freischaltcodes für Bally Wulff Gamestation und Action Star Automaten.">
    <meta name="keywords" content="Bally Wulff, Code, Rechner, Generator, Gamestation, Action Star, Spielautomat">
    <meta property="og:title" content="Bally Wulff Code Rechner - Automatenunsinn">
    <meta property="og:description" content="Kostenloser Online-Rechner zur Generierung von Freischaltcodes für Bally Wulff Automaten.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://automatenunsinn.github.io/bw.html">
    <link rel="canonical" href="https://automatenunsinn.github.io/bw.html" />
    <link rel="stylesheet" href="bw.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="bally.js"></script>
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Bally Wulff Code Rechner",
        "url": "https://automatenunsinn.github.io/bw.html",
        "description": "Kostenloser Online-Rechner zur Generierung von Freischaltcodes für Bally Wulff Spielautomaten.",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "Web Browser",
        "author": {
          "@type": "Organization",
          "name": "Automatenunsinn"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": ["MathSolver", "LearningResource"],
        "name": "Bally Wulff Code Rechner",
        "url": "https://automatenunsinn.github.io/bw.html",
        "usageInfo": "https://automatenunsinn.github.io/bw.html",
        "inLanguage": "de",
        "potentialAction": [{
          "@type": "SolveMathAction",
          "target": "https://automatenunsinn.github.io/bw.html?q={math_expression_string}",
          "mathExpression-input": "required name=math_expression_string",
          "eduQuestionType": ["Arithmetic"]
         }],
        "learningResourceType": "Math solver"
      }
    ]
    </script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
</head>

<body data-bs-theme="dark" class="bg-dark text-light">
    <h3>Platzanpassung/Sicherheit</h3>
    <h4>Freischaltung</h4>
    <a href="index.html" class="btn btn-link text-decoration-none text-light">Zurück</a>
    <table class="table table-dark table-sm">
        <tr><th><h1 class="mb-4 text-center">Freischaltung</h1></th></tr>
        <tr><td>
        <label><h2>Rückmeldecode:</h2></label>
        <input type="text" maxlength=5 pattern="[1-9A-HJ-LM-Z]" id="code1" class="codes form-control" oninput="checkLength(this, 5, 'code2')" onpaste="handlePaste(event)">
        <div class="invalid-feedback">Ungültiger Code.</div> -
        <input type="text" maxlength=5 pattern="[1-9A-HJ-LM-Z]" id="code2" class="codes form-control" oninput="checkLength(this, 5, 'code3')">
        <div class="invalid-feedback">Ungültiger Code.</div> -
        <input type="text" maxlength=5 pattern="[1-9A-HJ-LM-Z]" id="code3" class="codes form-control" oninput="checkLength(this, 5, 'code4')">
        <div class="invalid-feedback">Ungültiger Code.</div> -
        <input type="text" maxlength=5 pattern="[1-9A-HJ-LM-Z]" id="code4" class="codes form-control" oninput="checkLength(this, 5, 'code5')">
        <div class="invalid-feedback">Ungültiger Code.</div> -
        <input type="text" maxlength=6 pattern="[1-9A-HJ-LM-Z]" id="code5" class="codel form-control" oninput="checkLength(this, 6, null)">
        <div class="invalid-feedback">Ungültiger Code.</div><br>
        <input type="button" value="Dekodieren" onclick="parseCode()" class="btn btn-outline-light"><br>
        <label for="date"><h2>Ablaufdatum:</h2></label>
        <input type="date" name="date" id="date" min="1989-01-01" max="2089-12-31" class="form-control">
        <div class="invalid-feedback">Ungültiges Datum.</div>
        <input type="button" value="+2 Jahre" onclick="addTwoYears()" style="width: 49%;" class="btn btn-outline-light"> <input type="button" value="2089" onclick="maxDate()" style="width: 49%;" class="btn btn-outline-light"><br>
        <input type="button" value="Enkodieren" onclick="genCode()" class="btn btn-outline-light"><br>
        <label><h2>Freischaltcode:</h2></label>
        <input type="text" maxlength=5 id="out1" class="codes" value="_____" readonly> -
        <input type="text" maxlength=5 id="out2" class="codes" value="" readonly> -
        <input type="text" maxlength=5 id="out3" class="codes" value="" readonly> -
        <input type="text" maxlength=5 id="out4" class="codes" value="" readonly> -
        <input type="text" maxlength=6 id="out5" class="codel" value="" readonly>
        <input type="button" value="Kopieren" onclick="copyCode()" class="btn btn-outline-light"><br>
        </td></tr>
    </table>
</body>

</html>
