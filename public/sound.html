<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundkarten Flasher - Automatenunsinn</title>
    <meta name="description" content="Tool zum Beschreiben von ADP Soundkarten über WebSerial.">
    <meta name="keywords" content="ADP, Soundkarte, Flasher, WebSerial, Merkur, Spielautomat, Automatenunsinn">
    <link rel="canonical" href="https://automatenunsinn.github.io/sound.html">
    <meta property="og:title" content="Soundkarten Flasher - Automatenunsinn">
    <meta property="og:description" content="Tool zum Beschreiben von ADP Soundkarten über WebSerial.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://automatenunsinn.github.io/sound.html">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Soundkarten Flasher - Automatenunsinn",
      "url": "https://automatenunsinn.github.io/sound.html",
      "description": "Tool zum Beschreiben von ADP Soundkarten über WebSerial.",
      "applicationCategory": "Tool",
      "operatingSystem": "Web"
    }
    </script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="sound.js" type="module"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
</head>

<body>
    <div class="container">
        <h1>Soundkarten Flasher</h1>
            <div>
                <p>Die TTL-Verbindung erfolgt durch einen Inverter (z.B. 74HC14)</p>
                <button id="connectBtn">Verbinden</button>

                <h3>Soundkarte auswählen</h3>

                <div id="fileInfo" class="kleingedrucktes"></div>
                <select id="fileSelect" disabled>
                    <option value="">-- Datei auswählen --</option>
                </select>
                <button id="loadFileBtn" disabled>Laden</button>
                <button id="loadCustomFileBtn">Eigene Datei...</button>

                <legend>Aktionen</legend>
                <button id="killBtn" disabled>⚠️ Soundkarte löschen</button>
                <button id="flashBtn" disabled>Flash</button>

                <div class="progress-row">
                    <progress id="progressBar" max="100"></progress>
                </div>

                <label for="logArea">Log</label>
                <textarea id="logArea" readonly style="height: 15em;"></textarea>
            </div>
        <a href="index.html">Zurück</a>
    </div>
</body>

</html>
