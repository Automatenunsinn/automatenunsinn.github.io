<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADP Freischaltcode Rechner - Automatenunsinn</title>
    <meta name="description" content="Kostenloser Online-Rechner zur Generierung von Freischaltcodes für ADP/Merkur Spielautomaten (Walzen- und Bildschirmgeräte).">
    <meta name="keywords" content="ADP, Merkur, Freischaltcode, Rechner, Generator, Spielautomat, Walzengeräte, Bildschirmgeräte">
    <meta property="og:title" content="ADP Freischaltcode Rechner - Automatenunsinn">
    <meta property="og:description" content="Kostenloser Online-Rechner zur Generierung von Freischaltcodes für ADP/Merkur Spielautomaten.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://automatenunsinn.github.io/zl.html">
    <link rel="canonical" href="https://automatenunsinn.github.io/zl.html" />
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script src="zl.js"></script>
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "ADP Freischaltcode Rechner",
        "url": "https://automatenunsinn.github.io/zl.html",
        "description": "Kostenloser Online-Rechner zur Generierung von Freischaltcodes für ADP/Merkur Spielautomaten.",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "Web Browser",
        "author": {
          "@type": "Organization",
          "name": "Automatenunsinn"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": ["MathSolver", "LearningResource"],
        "name": "ADP Freischaltcode Rechner",
        "url": "https://automatenunsinn.github.io/zl.html",
        "usageInfo": "https://automatenunsinn.github.io/zl.html",
        "inLanguage": "de",
        "potentialAction": [{
          "@type": "SolveMathAction",
          "target": "https://automatenunsinn.github.io/zl.html?q={math_expression_string}",
          "mathExpression-input": "required name=math_expression_string",
          "eduQuestionType": ["Arithmetic"]
         }],
        "learningResourceType": "Math solver"
      }
    ]
    </script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
</head>

<body data-bs-theme="dark" class="bg-dark text-light">
    <main class="container py-5">
        <div class="card bg-dark border-secondary shadow-lg">
            <div class="card-body">
        <h1 style="background-color: firebrick;color: white;border: ridge darkred;padding: 1em;">Code / NEU</h1>
        <label for="zlNr">Zulassungsnummer:</label>
        <input type="tel" inputmode="numeric" name="zlNr" id="zlNr" pattern="\d{9,9}" maxlength="9" placeholder="123456789" class="form-control"><br>
        <input type="text" id="machinename" readonly placeholder="Maschinenname" class="form-control"><br>
        <label for="date">Startdatum:</label>
        <input type="date" name="date" id="date" class="form-control"><br>
        <select name="version" id="version" class="form-control">
            <option value="V2">Ältere Geräte</option>
            <option value="V3">Neuere Geräte</option>
        </select>
        <input type="button" value="weiter" onclick="main()" class="btn btn-outline-light"><br>
        <div class="output" style="background-color: DodgerBlue;color: white;">
            <h2>Inbetriebnahme</h2>
            <h3>System</h3>
            <label for="out" style="text-align: left;font-weight: bold;">Freischaltcode:</label>
            <input type="text" name="out" id="out" placeholder="Neuen Code eingeben?" style="font-family: serif, monospace;" class="form-control"><br>
        </div>
        <br>
        <a href="https://automatenunsinn.github.io/index.html">Ende</a>
        <br>
        <br>
        <a href="https://github.com/Automatenunsinn/automatenunsinn.github.io/archive/refs/heads/gh-pages.zip">Download</a>
    </div></div></main>
</body>

</html>
