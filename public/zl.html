<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADP Freischaltcode Generator</title>
    <meta name="description" content="Freischaltcode Generator für ADP/Merkur Automaten.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script src="zl.js"></script>
</head>

<body>
    <div class="container">
        <label for="zlNr">Zulassungsnummer:</label>
        <input type="text" inputmode="numeric" name="zlNr" id="zlNr" placeholder="123456789"><br>
        <label for="date">Startdatum:</label>
        <input type="date" name="date" id="date"><br>
        <select name="version" id="version">
            <option value="V2">Walzengeräte</option>
            <option value="V3">Bildschirmgeräte</option>
        </select>
        <input type="button" value="Generieren" onclick="main()"><br>
        <div class="output">
            <label for="out">Freischaltcode:</label>
            <input type="text" name="out" id="out" value=""><br>
        </div>
        <br>
        <a href="index.html">Zurück</a>
    </div>
</body>

</html>
