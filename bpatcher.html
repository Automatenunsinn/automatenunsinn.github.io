<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EPROM Patcher</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>EPROM Patcher</h1>

        <section>
            <h2>ROM laden</h2>
            <div class="file-group">
                <label>16-Bit-Datei laden:</label>
                <input type="file" id="singleRom" accept=".bin" />
                <button onclick="loadSingleFile()">Laden</button>
            </div>
            <div class="file-group">
                <label>Duale 8-Bit-Dateien laden:</label>
                <div class="file-pair">
                    <input type="file" id="oddRom" accept=".bin,.ic10" />
                    <span>ODD (IC10)</span>
                </div>
                <div class="file-pair">
                    <input type="file" id="evenRom" accept=".bin,.ic14" />
                    <span>EVEN (IC14)</span>
                </div>
                <button onclick="loadDualFiles()">Laden</button>
            </div>
        </section>

        <hr />

        <section>
            <h2>Patch-Einstellungen</h2>
            <div class="form-group">
                <label for="dateInput">Datum (JJJJMMTT):</label>
                <input type="text" id="dateInput" value="20251227" placeholder="z.B. 20251227" />
            </div>
            <div class="form-group">
                <label for="zlInput">Zulassungsnummer:</label>
                <input type="text" id="zlInput" value="123456789" placeholder="z.B. 123456789" />
            </div>
        </section>

        <section>
            <h2>Patch-Prozess</h2>
            <button onclick="patchEPROM()">ROM patchen</button>
            <div id="statusText" class="status-text">Bereit</div>
        </section>

        <section>
            <h2>Informationen</h2>
            <div id="romInfo" class="rom-info"></div>
        </section>

        <a href="index.html">Zurück</a>
    </div>
    <script src="bpatcher.js" type="module"></script>
</body>

</html>
