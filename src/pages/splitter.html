<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROM Splitter/Merger - Automatenunsinn</title>
    <meta name="description" content="Tool zum Zusammenfügen oder Aufteilen von 16-Bit-ROMs in 8-Bit-ROMs.">
    <meta name="keywords" content="ROM, Splitter, Merger, 16-bit, 8-bit, EPROM, Automatenunsinn">
    <link rel="canonical" href="https://automatenunsinn.github.io/splitter.html">
    <meta property="og:title" content="ROM Splitter/Merger - Automatenunsinn">
    <meta property="og:description" content="Tool zum Zusammenfügen oder Aufteilen von 16-Bit-ROMs in 8-Bit-ROMs.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://automatenunsinn.github.io/splitter.html">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ROM Splitter/Merger - Automatenunsinn",
      "url": "https://automatenunsinn.github.io/splitter.html",
      "description": "Tool zum Zusammenfügen oder Aufteilen von 16-Bit-ROMs in 8-Bit-ROMs.",
      "applicationCategory": "Tool",
      "operatingSystem": "Web"
    }
    </script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
</head>

<body>
    <main class="container py-5">
        <div class="card border-secondary shadow-lg">
            <div class="card-body">
        <h1 class="mb-4 text-center">ROM Merger/Splitter</h1>

        <section>
            <h2>ROMs mergen</h2>
            <input type="file" id="highRom" accept=".bin,.ic15,.u2" class="form-control">Odd ROM<br>
            <input type="file" id="lowRom" accept=".bin,.ic10,.u6" class="form-control">Even ROM<br>
            <button onclick="mergeROMs()" class="btn btn-primary">Merge</button>
        </section>

        <hr />

        <section>
            <h2>ROM splitten</h2>
            <input type="file" id="fullRom" accept=".bin" class="form-control">16-bit ROM<br>
            <button onclick="splitROM()" class="btn btn-primary">Split</button>
        </section>
        <a href="index.html" class="btn btn-secondary">Zurück</a>
    </div></div></main>
    <script src="splitter.js" type="module"></script>
</body>

</html>
