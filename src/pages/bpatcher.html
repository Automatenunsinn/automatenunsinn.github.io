<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bally Wulff EPROM Patcher - Automatenunsinn</title>
    <meta name="description" content="Tool zum Patchen von EPROMs für Bally Wulff Automaten. Behebt den NVRAM Init Fehler und setzt das Datum, um die Uhrprobleme zu beheben.">
    <meta name="keywords" content="Bally Wulff, EPROM, Patcher, NVRAM Init, Reparatur, Automatenunsinn">
    <link rel="canonical" href="https://automatenunsinn.github.io/bpatcher.html">
    <meta property="og:title" content="Bally Wulff EPROM Patcher - Automatenunsinn">
    <meta property="og:description" content="Tool zum Patchen von EPROMs für Bally Wulff Automaten. Behebt den NVRAM Init Fehler und setzt das Datum, um die Uhrprobleme zu beheben.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://automatenunsinn.github.io/bpatcher.html">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Bally Wulff EPROM Patcher - Automatenunsinn",
      "url": "https://automatenunsinn.github.io/bpatcher.html",
      "description": "Tool zum Patchen von EPROMs für Bally Wulff Automaten. Behebt den NVRAM Init Fehler und setzt das Datum, um die Uhrprobleme zu beheben.",
      "applicationCategory": "Tool",
      "operatingSystem": "Web"
    }
    </script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
</head>

<body>
    <main class="container py-5">
        <div class="card border-secondary shadow-lg">
            <div class="card-body">
        <h1 class="mb-4 text-center">Bally Wulff EPROM Patcher Tool</h1>

        <section>
            <h2>ROM laden</h2>
            <div class="row row-cols-1 row-cols-md-2 g-4">
                <div class="col">
                    <div class="card">
                        <div class="card-header">16-Bit-Datei</div>
                        <div class="card-body">
                            <input type="file" id="singleRom" accept=".bin" disabled class="form-control mb-3">
                            <button onclick="loadSingleFile()" class="btn btn-primary" disabled>Laden</button>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card">
                        <div class="card-header">Duale 8-Bit-Dateien</div>
                        <div class="card-body">
                            <div class="d-flex align-items-center gap-2 mb-3">
                                <input type="file" id="oddRom" accept=".bin,.ic15" class="form-control">
                                <span>ODD (IC15)</span>
                            </div>
                            <div class="d-flex align-items-center gap-2 mb-3">
                                <input type="file" id="evenRom" accept=".bin,.ic10" class="form-control">
                                <span>EVEN (IC10)</span>
                            </div>
                            <button onclick="loadDualFiles()" class="btn btn-primary">Laden</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h2>Patch-Einstellungen</h2>
            <div class="mb-3">
                <label for="dateInput" class="form-label">Datum (JJJJMMTT):</label>
                <input type="text" id="dateInput" value="20111213" class="form-control">
            </div>
            <div class="mb-3">
                <label for="zlInput" class="form-label">Zulassungsnummer:</label>
                <input type="text" id="zlInput" placeholder="123456789" class="form-control">
            </div>
        </section>

        <section>
            <h2>Patch-Prozess</h2>
            <button onclick="patchEPROM()" class="btn btn-primary">ROM patchen</button><br>
            <div class="progress mt-3">
                <div id="progressBar" class="progress-bar bg-success" role="progressbar" style="width: 0%;" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">0%</div>
            </div>
        </section>

        <section>
            <h2>Informationen</h2>
            <div id="statusText">Bereit</div>
            <div id="romInfo"></div>
        </section>

        <a href="index.html" class="btn btn-secondary">Zurück</a>
    </div></div></main>
    <script src="bpatcher.js" type="module"></script>
</body>

</html>
