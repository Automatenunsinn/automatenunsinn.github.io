<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATmega48 Flasher - Automatenunsinn</title>
    <meta name="description" content="Tool zum Flashen eines ATmega48 über Arduino as ISP.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <main class="container py-5">
        <div class="card border-secondary shadow-lg">
            <div class="card-body">
        <h1 class="mb-4 text-center">ATmega48 Flasher</h1>
        <p>Dieses Tool erlaubt es, einen ATmega48 über einen <strong>Arduino as ISP</strong> zu beschreiben.</p>
        <p>Wichtig: Der Arduino <a href="isp.html">muss als ISP programmiert sein</a>.</p>

        <div class="row row-cols-1 row-cols-lg-2 g-4">
            <div>
                <button id="connectBtn" class="btn btn-primary">Verbinden</button>
            </div>
            <div>
                <label for="hexFile" class="form-label">Flash (.hex/.bin)</label>
                <input type="file" id="hexFile" accept=".hex,.bin" class="form-control">
            </div>
            <div>
                <label for="eepromFile" class="form-label">EEPROM (.hex/.bin)</label>
                <input type="file" id="eepromFile" accept=".hex,.bin" class="form-control">
            </div>
        </div>

        <div class="card bg-body-secondary border-secondary p-3 mb-3">
            <button id="flashBtn" disabled class="btn btn-primary">Flashen</button>
            <progress id="progressBar" value="0" max="100"></progress>
        </div>

        <label for="logArea" class="form-label">Log</label>
        <textarea id="logArea" readonly style="height: 20em;" class="form-control"></textarea>
        
        <br>
        <a href="index.html" class="btn btn-secondary">Zurück</a>
    </div></div></main>

    <script src="atmega.js"></script>
</body>
</html>
